<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Snake Game</title>
    <style>
        /* Reset and Base Setup */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            
            /* Green checkerboard background matching image_e8dc95.png */
            background-color: #39c639;
            background-image: conic-gradient(#2ca82c 25%, #39c639 0 50%, #2ca82c 0 75%, #39c639 0);
            background-size: 60px 60px;
        }

        /* Card Container */
        .download-card {
            background-color: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 440px;
            width: 100%;
            /* Purple accent border matching the snake body color */
            border: 5px solid #7b1fa2; 
        }

        /* Snake Game Title Styling */
        h1 {
            margin: 0 0 20px 0;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            background-color: #2ca82c;
            padding: 12px;
            border-radius: 8px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }

        /* Image Preview Box */
        .game-preview {
            margin: 20px 0;
            border: 4px solid #e91e63; /* Pink accent matching the snake head color */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            background-color: #000;
        }

        .game-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        p {
            color: #333333;
            font-size: 1.1rem;
            line-height: 1.5;
            margin: 15px 0;
        }

        /* Retro Arcade Styling for the Button */
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 16px 40px;
            background-color: #e91e63; /* Pink snake head color */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.25rem;
            border-radius: 50px;
            /* Creates a 3D button effect using the purple snake body color */
            border-bottom: 6px solid #7b1fa2; 
            transition: all 0.1s ease;
            box-shadow: 0 6px 16px rgba(233, 30, 99, 0.35);
            text-transform: uppercase;
        }

        .download-btn:hover {
            background-color: #d81b60;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.45);
        }

        .download-btn:active {
            transform: translateY(4px);
            border-bottom: 2px solid #7b1fa2;
            margin-top: 14px;
            box-shadow: 0 2px 5px rgba(233, 30, 99, 0.2);
        }
    </style>
</head>
<body>

    <div class="download-card">
        <!-- Snake Game Title -->
        <h1>Snake Game</h1>
        
        <p>Dodge the brick obstacles, gobble up red apples, and try to beat your highest score!</p>
        
        <!-- Embedded Preview Graphic using image_e8dc95.png -->
        <div class="game-preview">
            <img src="preview.png" alt="Snake Game Gameplay Frame">
        </div>

        <p>Get the offline version for your PC instantly.</p>
        
        <!-- Download Trigger -->
        <a href="dist/main.exe" download="SnakeGame.exe" class="download-btn">
            🕹️ Download Now
        </a>
    </div>

</body>
</html>
