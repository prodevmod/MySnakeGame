name: Deploy Pygbag Game to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the build whenever you push to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: pip install pygbag

      - name: Build Web Application
        run: python -m pygbag --build snake # <-- Changed from '.' to 'snake'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: snake/build/web # <-- Changed from 'build/web' to 'snake/build/web'
          branch: gh-pages